<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <radialGradient id="tableSurf" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#2e8b57"/>
      <stop offset="60%" stop-color="#1a6b3a"/>
      <stop offset="85%" stop-color="#145a2e"/>
      <stop offset="100%" stop-color="#0d3d1a"/>
    </radialGradient>
    <filter id="feltNoise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.04"/>
      </feComponentTransfer>
    </filter>
    <radialGradient id="innerGlow" cx="50%" cy="50%">
      <stop offset="70%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.3)"/>
    </radialGradient>
  </defs>
  <ellipse cx="400" cy="300" rx="380" ry="280" fill="url(#tableSurf)"/>
  <ellipse cx="400" cy="300" rx="380" ry="280" fill="none" filter="url(#feltNoise)"/>
  <ellipse cx="400" cy="300" rx="380" ry="280" fill="url(#innerGlow)"/>
  <ellipse cx="400" cy="300" rx="380" ry="280" fill="none" stroke="#1a3a25" stroke-width="8"/>
  <ellipse cx="400" cy="300" rx="374" ry="274" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
</svg>
