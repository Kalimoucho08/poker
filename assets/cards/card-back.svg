<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 168 240">
  <defs>
    <pattern id="grid" width="12" height="12" patternUnits="userSpaceOnUse">
      <rect width="12" height="12" fill="#0d2137"/>
      <rect width="6" height="6" fill="#153055"/>
      <rect x="6" y="6" width="6" height="6" fill="#153055"/>
    </pattern>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="50%" stop-color="#0f2a4a"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0d060"/>
      <stop offset="50%" stop-color="#8b6914"/>
      <stop offset="100%" stop-color="#f0d060"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect x="3" y="3" width="162" height="234" rx="10" ry="10" fill="url(#bgGrad)"/>
  <rect x="3" y="3" width="162" height="234" rx="10" ry="10" fill="url(#grid)" opacity="0.3"/>
  <!-- Inner border -->
  <rect x="11" y="11" width="146" height="218" rx="6" ry="6" fill="none" stroke="url(#borderGrad)" stroke-width="1.5" opacity="0.6"/>
  <!-- Diamond pattern -->
  <rect x="50" y="55" width="68" height="130" rx="8" ry="8" fill="none" stroke="#f0d060" stroke-width="1.5" opacity="0.5" transform="rotate(0, 84, 120)"/>
  <!-- Center spade -->
  <g transform="translate(84, 108)" opacity="0.7">
    <path d="M0,-20 C-15,-5 -20,10 -20,18 C-20,26 -12,30 0,24 C12,30 20,26 20,18 C20,10 15,-5 0,-20Z" fill="#f0d060" stroke="none"/>
    <path d="M0,18 L-8,30 L8,30 Z" fill="#f0d060" stroke="none"/>
    <path d="M-8,30 L8,30 L0,24 Z" fill="#8b6914"/>
    <path d="M-8,30 A12,8 0 0,0 8,30" fill="none" stroke="#8b6914" stroke-width="0.5"/>
  </g>
  <!-- Corner accents -->
  <g opacity="0.3">
    <text x="16" y="30" font-size="16" fill="#f0d060" font-family="serif">♠</text>
    <text x="136" y="30" font-size="16" fill="#f0d060" font-family="serif">♠</text>
    <text x="16" y="226" font-size="16" fill="#f0d060" font-family="serif">♠</text>
    <text x="136" y="226" font-size="16" fill="#f0d060" font-family="serif">♠</text>
  </g>
  <!-- Outer border -->
  <rect x="1" y="1" width="166" height="238" rx="11" ry="11" fill="none" stroke="#2a5080" stroke-width="2"/>
  <rect x="3" y="3" width="162" height="234" rx="10" ry="10" fill="none" stroke="#4a80b0" stroke-width="0.5" opacity="0.4"/>
</svg>
