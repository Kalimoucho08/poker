<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 168 240">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Card background -->
  <rect x="2" y="2" width="164" height="236" rx="8" ry="8" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="2" y="2" width="164" height="236" rx="8" ry="8" fill="none" stroke="#d0d0d0" stroke-width="1"/>
  
  <!-- Top-left rank & suit -->
  <text x="14" y="30" font-size="18" font-weight="bold" fill="#1a1a2e" font-family="'Segoe UI', Arial, sans-serif" text-anchor="start">K</text>
  <text x="14" y="50" font-size="14" fill="#1a1a2e" font-family="serif" text-anchor="start">♣</text>
  
  <!-- Center symbols -->
  <text x="84" y="120" font-size="36" fill="#1a1a2e" font-family="serif" text-anchor="middle" dominant-baseline="central">♣</text>
  <text x="154" y="202" font-size="18" font-weight="bold" fill="#1a1a2e" font-family="'Segoe UI', Arial, sans-serif" text-anchor="end" transform="rotate(180, 154, 202)">K</text>
  <text x="154" y="222" font-size="14" fill="#1a1a2e" font-family="serif" text-anchor="end">♣</text>
  
  <!-- Face card designs -->
  <g opacity="0.5">
    <path d="M64,48 L52,65 L64,58 L76,65 L84,48 L76,58 L64,53 L52,58 Z" fill="#1a1a2e"/>
    <circle cx='68' cy='78' r='10' fill='#1a1a2e' opacity='0.3'/>
    <ellipse cx='68' cy='110' rx='14' ry='22' fill='#1a1a2e' opacity='0.2'/>
    <text x="68" y="145" font-size="28" fill="#1a1a2e" font-family="serif" text-anchor="middle">♣</text>
  </g>
</svg>
