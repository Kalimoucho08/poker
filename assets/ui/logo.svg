<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80">
  <defs>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0d060"/>
      <stop offset="100%" stop-color="#d4a017"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Card suits decoration -->
  <text x="20" y="45" font-size="28" fill="#e74c3c" font-family="serif" opacity="0.5">♥</text>
  <text x="55" y="55" font-size="24" fill="#1a1a2e" font-family="serif" opacity="0.5">♣</text>
  <text x="335" y="45" font-size="28" fill="#1a1a2e" font-family="serif" opacity="0.5">♠</text>
  <text x="365" y="55" font-size="24" fill="#e74c3c" font-family="serif" opacity="0.5">♦</text>
  <!-- Main text -->
  <text x="200" y="45" font-size="26" font-weight="900" fill="url(#logoGrad)" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" filter="url(#glow)">TEXAS HOLD'EM</text>
  <text x="200" y="68" font-size="14" fill="#aaa" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" letter-spacing="6">POKER</text>
</svg>
