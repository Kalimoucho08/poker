<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a35"/>
      <stop offset="100%" stop-color="#12122a"/>
    </linearGradient>
    <pattern id="gridSubtle" width="20" height="20" patternUnits="userSpaceOnUse">
      <line x1="20" y1="0" x2="20" y2="20" stroke="rgba(255,255,255,0.015)" stroke-width="1"/>
      <line x1="0" y1="20" x2="20" y2="20" stroke="rgba(255,255,255,0.015)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="100" height="100" fill="url(#panelGrad)"/>
  <rect width="100" height="100" fill="url(#gridSubtle)"/>
  <rect x="0" y="0" width="100" height="100" rx="4" fill="none" stroke="#2a2a45" stroke-width="1"/>
</svg>
